syntax = "proto3";

package sonora.audio;

service AudioService {
  rpc GenerateAudio (GenerateAudioRequest) returns (GenerateAudioResponse);
  rpc GetJobStatus (JobStatusRequest) returns (JobStatusResponse);
  rpc ListJobs (ListJobsRequest) returns (ListJobsResponse);
}

message GenerateAudioRequest {
  string article_id = 1;
  string article_text = 2;
  string user_id = 3;
}

message GenerateAudioResponse {
  string job_id = 1;
  string status = 2;
}

message JobStatusRequest {
  string job_id = 1;
}

message JobStatusResponse {
  string job_id = 1;
  string status = 2;
  string audio_url = 3;
  int32 duration_seconds = 4;
  string error_message = 5;
}

message ListJobsRequest {
  string user_id = 1;
}

message AudioJobSummary {
  string job_id = 1;
  string article_id = 2;
  string user_id = 3;
  string status = 4;
  string audio_url = 5;
  int32 duration_seconds = 6;
  string error_message = 7;
  string article_text = 8;
}

message ListJobsResponse {
  repeated AudioJobSummary jobs = 1;
}
