version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sonora
      POSTGRES_USER: sonora
      POSTGRES_PASSWORD: sonora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonora -d sonora"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  playlist-service:
    build: ./sonora-playlist-service
    env_file:
      - ./sonora-playlist-service/.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"

  audio-service:
    build: ./sonora-audio-service
    env_file:
      - ./sonora-audio-service/.env.example
    depends_on:
      - mongo
    ports:
      - "50051:50051"
    volumes:
      - audiodata:/tmp/sonora-audio

  backend:
    build: ./sonora-backend
    env_file:
      - ./sonora-backend/.env
    depends_on:
      - playlist-service
      - audio-service
    ports:
      - "4000:4000"
    volumes:
      - audiodata:/tmp/sonora-audio

  frontend:
    build: ./sonora-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
  mongodata:
  audiodata:
